<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0F0F0F" />
  <title>Pairchive · THE PERSONAL CURATION</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="./css/font.css" />
  <link rel="stylesheet" href="./css/global.css" />

  <link rel="stylesheet" href="./css/screens/intro.css" />
  <link rel="stylesheet" href="./css/screens/onboarding.css" />
  <link rel="stylesheet" href="./css/screens/empty-shelf.css" />
  <link rel="stylesheet" href="./css/screens/shelf.css" />
  <link rel="stylesheet" href="./css/screens/reading.css" />
  <link rel="stylesheet" href="./css/screens/capture.css" />
  <link rel="stylesheet" href="./css/screens/share-sheet.css" />
  <link rel="stylesheet" href="./css/screens/save-sheet.css" />
  <link rel="stylesheet" href="./css/screens/reaction.css" />
  <link rel="stylesheet" href="./css/screens/reactions.css" />
  <link rel="stylesheet" href="./css/screens/close-consent.css" />
  <link rel="stylesheet" href="./css/screens/close-book.css" />
  <link rel="stylesheet" href="./css/screens/wow-moment.css" />
  <link rel="stylesheet" href="./css/screens/report.css" />
  <link rel="stylesheet" href="./css/screens/invite.css" />
  <link rel="stylesheet" href="./css/screens/invite-letter.css" />
  <link rel="stylesheet" href="./css/screens/lock-noti.css" />
  <link rel="stylesheet" href="./css/screens/archived.css" />
  <link rel="stylesheet" href="./css/screens/settings.css" />
  <link rel="stylesheet" href="./css/screens/solo-empty.css" />
</head>
<body data-scheme="light">

  <header id="status-bar" class="status-bar" data-hidden="false" aria-hidden="true">
    <span class="status-bar__time">9:41</span>
    <span class="status-bar__right">
      <i class="ic ic--signal"></i>
      <i class="ic ic--wifi"></i>
      <i class="ic ic--battery"></i>
    </span>
  </header>

  <main id="app" class="screen-host" data-state="idle"></main>

  <footer id="home-indicator" class="home-indicator" data-hidden="false" aria-hidden="true">
    <span class="home-indicator__bar"></span>
  </footer>

  <!-- 미니 페이저 — 우하단에 prev / next 두 버튼 -->
  <nav class="pager" aria-label="화면 이동">
    <button id="pager-prev" class="pager__btn" type="button" aria-label="이전 화면">
      <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
        <path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button id="pager-next" class="pager__btn" type="button" aria-label="다음 화면">
      <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
        <path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </nav>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
