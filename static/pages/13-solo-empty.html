<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <title>13. 1인 모드 빈 서재 · Pairchive</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/common.css" />
</head>
<body class="editorial-host">
  <section class="editorial editorial--solo">

          <div class="ed-status" aria-hidden="true">
            <span>9:41</span>
            <span class="ed-status__right">
              <span class="ed-icon-signal"></span>
              <span class="ed-icon-wifi"></span>
              <span class="ed-icon-battery"></span>
            </span>
          </div>

          <div class="ed-page" style="padding-top:8px;">

            <header style="text-align:center; padding: 28px 28px 0;">
              <p class="ed-eyebrow">My Personal Curation</p>

              <h1 class="ed-title" style="margin-top: 26px;">
                MY<br/>PERSONAL<br/>CURATION
              </h1>

              <p class="ed-caption" style="margin-top: 18px;">
                오롯이 혼자만의 책장.<br/>
                언제든 한 사람을 초대할 수 있어요.
              </p>

              <!-- 페어 대신 솔로 배지 -->
              <div style="display:flex; justify-content:center; margin-top: 14px;">
                <span class="ed-badge ed-badge--solo">SOLO MODE</span>
              </div>
            </header>

            <!-- 빈 책장 (페어 모드보다 더 차분, 가운데 1권만 강조) -->
            <div class="shelf-stage" aria-hidden="true">
              <div class="shelf">
                <span class="spine spine--empty spine--xshort"><span class="spine__label">···</span></span>
                <span class="spine spine--empty spine--short"><span class="spine__label">···</span></span>
                <div class="shelf-new-book" style="
                    background: linear-gradient(180deg, #E2DCC9 0%, #C9C2AC 100%);
                    border-color: rgba(27,22,18,0.16);
                  " aria-label="혼자만의 첫 책 자리">
                  <span class="shelf-new-book__label">First&nbsp;Volume</span>
                </div>
                <span class="spine spine--empty spine--short"><span class="spine__label">···</span></span>
                <span class="spine spine--empty spine--xshort"><span class="spine__label">···</span></span>
              </div>
              <div class="shelf-floor"></div>
            </div>
          </div>

          <footer class="ed-footer">
            <button class="ed-btn ed-btn--block">혼자 첫 책 시작하기</button>
            <button class="ed-btn ed-btn--ghost ed-btn--block">한 사람 초대하기</button>
            <p class="ed-caption" style="font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute);">
              초대하면 페어 모드로 전환돼요
            </p>
          </footer>

        </section>
</body>
</html>
