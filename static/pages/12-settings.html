<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <title>12. 설정 · Pairchive</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/common.css" />
</head>
<body class="editorial-host">
  <section class="editorial editorial--soft">

          <div class="ed-status" aria-hidden="true">
            <span>9:41</span>
            <span class="ed-status__right">
              <span class="ed-icon-signal"></span>
              <span class="ed-icon-wifi"></span>
              <span class="ed-icon-battery"></span>
            </span>
          </div>

          <!-- nav title -->
          <header style="padding: 8px 22px 0; display:flex; justify-content:space-between; align-items:center;">
            <button class="ed-btn ed-btn--ghost" style="min-height: 36px; padding: 6px 12px; font-size: 12px;">‹ 책장</button>
            <span class="ed-section-label" style="font-size:9px;">Settings</span>
            <span style="width: 36px;"></span>
          </header>

          <div class="ed-page" style="padding: 14px 20px 18px;">

            <header style="text-align:center;">
              <p class="ed-eyebrow">Personal Curation</p>
              <h1 class="ed-title ed-title--sm" style="margin-top: 12px;">설정</h1>
            </header>

            <!-- Profile card -->
            <article class="ed-card" style="margin-top: 22px; flex-direction: row; align-items:center; gap: 14px;">
              <span style="
                  width: 56px; height: 56px; border-radius: 14px;
                  background: linear-gradient(135deg, #FFC1EA, #FF6EB4);
                  color: #fff; font-family: var(--serif); font-size: 22px;
                  display: grid; place-items: center; flex-shrink: 0;
                " aria-hidden="true">야</span>
              <div style="flex:1;">
                <p style="font-weight: 600; font-size: 16px; letter-spacing: -0.01em;">야지</p>
                <p class="ed-list__item-meta">@yaji · 두비와 페어 중</p>
              </div>
              <span class="ed-list__chev">›</span>
            </article>

            <!-- 페어 섹션 -->
            <p class="ed-section-label" style="margin: 18px 4px 8px;">페어</p>
            <div class="ed-list">
              <button class="ed-list__item" type="button">
                페어 관리
                <span class="ed-list__chev">두비 ›</span>
              </button>
              <button class="ed-list__item" type="button">
                초대 링크 다시 만들기
                <span class="ed-list__chev">›</span>
              </button>
              <button class="ed-list__item" type="button">
                알림 (페이지 · 와우 · 책 덮기)
                <span class="ed-list__chev">켜짐 ›</span>
              </button>
            </div>

            <!-- 책장 섹션 -->
            <p class="ed-section-label" style="margin: 18px 4px 8px;">책장</p>
            <div class="ed-list">
              <button class="ed-list__item" type="button">
                현재 책 표지
                <span class="ed-list__chev">Film Archive ›</span>
              </button>
              <button class="ed-list__item" type="button">
                카테고리 정리
                <span class="ed-list__chev">8칸 ›</span>
              </button>
              <button class="ed-list__item" type="button">
                1인 모드로 전환
                <span class="ed-list__chev">›</span>
              </button>
            </div>

            <!-- 데이터 -->
            <p class="ed-section-label" style="margin: 18px 4px 8px;">데이터</p>
            <div class="ed-list">
              <button class="ed-list__item" type="button">
                책 PDF로 내보내기
                <span class="ed-list__chev">›</span>
              </button>
              <button class="ed-list__item" type="button">
                백업 · 동기화
                <span class="ed-list__chev">iCloud ›</span>
              </button>
            </div>

            <!-- 계정 -->
            <p class="ed-section-label" style="margin: 18px 4px 8px;">계정</p>
            <div class="ed-list">
              <button class="ed-list__item" type="button">
                도움말
                <span class="ed-list__chev">›</span>
              </button>
              <button class="ed-list__item ed-list__item--destructive" type="button">
                로그아웃
                <span class="ed-list__chev" style="color: var(--rose-ink);">›</span>
              </button>
            </div>

            <p class="ed-caption" style="margin: 22px 0 0; font-size: 11px; color: var(--ink-mute);">
              Pairchive v0.4 · 우리 둘만의 책장
            </p>
          </div>

        </section>
</body>
</html>
