<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <title>4. 캡처 · Pairchive</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/common.css" />
</head>
<body class="editorial-host">
  <section class="editorial" style="background: linear-gradient(180deg, #1B1612 0%, #2A2218 100%);">

          <div class="ed-status" aria-hidden="true" style="color:#F2EFE7;">
            <span>9:41</span>
            <span class="ed-status__right">
              <span class="ed-icon-signal"></span>
              <span class="ed-icon-wifi"></span>
              <span class="ed-icon-battery"></span>
            </span>
          </div>

          <!-- Safari 같은 배경 페이지 흐림 -->
          <div style="flex:1; opacity:0.42; padding: 18px 22px; color:#F2EFE7;">
            <p class="ed-section-label" style="color:rgba(242,239,231,0.6);">SAFARI</p>
            <p style="font-family: var(--serif); font-size: 26px; line-height: 1.2; margin-top: 8px; opacity: 0.85;">
              The Geometry of Linear Transformations
            </p>
            <p style="font-size: 12px; opacity: 0.5; margin-top: 8px;">
              youtube.com · 3Blue1Brown
            </p>
            <div style="margin-top: 22px; height: 160px; border-radius: 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);"></div>
            <p style="font-size: 12px; opacity: 0.4; margin-top: 14px; line-height: 1.6;">
              When you think of a matrix not as a grid of numbers, but as a way of bending space itself…
            </p>
          </div>

          <!-- Bottom sheet -->
          <section
            aria-label="이 페이지를 어느 책에 끼울까요?"
            style="
              background: var(--paper);
              border-radius: 22px 22px 0 0;
              padding: 14px 22px max(26px, env(safe-area-inset-bottom));
              box-shadow: 0 -16px 40px rgba(0,0,0,0.36);
              display: flex; flex-direction: column; gap: 16px;
              color: var(--ink);
            "
          >
            <span style="align-self:center; width: 38px; height: 5px; border-radius:99px; background: rgba(27,22,18,0.18);" aria-hidden="true"></span>

            <div style="text-align:center;">
              <p class="ed-eyebrow">New Page</p>
              <h2 class="ed-title ed-title--sm" style="margin-top: 6px;">
                어느 책에 끼울까요?
              </h2>
            </div>

            <!-- link preview -->
            <div class="link-tile">
              <span class="link-tile__thumb" style="--thumb:#15203F;" aria-hidden="true"></span>
              <div class="link-tile__body">
                <p class="link-tile__domain">youtube.com</p>
                <p class="link-tile__title">선형 대수학의 직관적 이해 — 3Blue1Brown</p>
              </div>
            </div>

            <!-- shelf picker -->
            <div class="ed-list" role="radiogroup" aria-label="저장할 책 선택">
              <button class="ed-list__item" role="radio" aria-checked="true" type="button">
                <span style="display:flex; align-items:center; gap:12px;">
                  <span class="spine spine--xshort" style="--spine:#15203F; height:32px; width:14px;"></span>
                  <span>
                    Design · APRIL 2025
                    <span class="ed-list__item-meta" style="display:block;">두비 · 야지의 현재 책</span>
                  </span>
                </span>
                <span style="color: var(--ink); font-size: 16px;">✓</span>
              </button>
              <button class="ed-list__item" role="radio" aria-checked="false" type="button">
                <span style="display:flex; align-items:center; gap:12px;">
                  <span class="spine spine--xshort" style="--spine:#B0394A; height:32px; width:14px;"></span>
                  <span>Film Notes</span>
                </span>
                <span class="ed-list__chev">›</span>
              </button>
              <button class="ed-list__item" role="radio" aria-checked="false" type="button">
                <span style="display:flex; align-items:center; gap:12px;">
                  <span class="spine spine--xshort spine--paper" style="height:32px; width:14px;"></span>
                  <span>+ 새 책 만들기</span>
                </span>
                <span class="ed-list__chev">›</span>
              </button>
            </div>

            <button class="ed-btn ed-btn--block">책에 끼워 넣기</button>
          </section>

        </section>
</body>
</html>
