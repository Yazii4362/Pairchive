<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <title>1. 빈 서재 · Pairchive</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/common.css" />
</head>
<body class="editorial-host">
  <section class="editorial">

          <!-- iOS status bar -->
          <div class="ed-status" aria-hidden="true">
            <span>9:41</span>
            <span class="ed-status__right">
              <span class="ed-icon-signal"></span>
              <span class="ed-icon-wifi"></span>
              <span class="ed-icon-battery"></span>
            </span>
          </div>

          <!-- Page body -->
          <div class="ed-page" style="padding-top:8px;">

            <header style="text-align:center; padding: 28px 28px 0;">
              <p class="ed-eyebrow">The Personal Curation</p>

              <h1 class="ed-title" style="margin-top: 28px;">
                THE<br/>PERSONAL<br/>CURATION
              </h1>

              <p class="ed-caption" style="margin-top: 18px;">
                두 사람의 첫 책장이<br/>
                아직 비어 있어요.
              </p>

              <div class="pair-row" style="justify-content:center; margin-top: 14px;">
                <span class="pair-avatars" aria-hidden="true">
                  <span class="pair-avatar">두</span>
                  <span class="pair-avatar pair-avatar--ink">야</span>
                </span>
                <span>두비 · 야지의 책장</span>
              </div>
            </header>

            <!-- 빈 책장 -->
            <div class="shelf-stage" aria-hidden="true">
              <div class="shelf">
                <span class="spine spine--empty spine--xshort"><span class="spine__label">···</span></span>
                <span class="spine spine--empty spine--short"><span class="spine__label">···</span></span>
                <div class="shelf-new-book" aria-label="새 책 자리">
                  <span class="shelf-new-book__label">New&nbsp;Book</span>
                </div>
                <span class="spine spine--empty spine--short"><span class="spine__label">···</span></span>
                <span class="spine spine--empty spine--xshort"><span class="spine__label">···</span></span>
              </div>
              <div class="shelf-floor"></div>
            </div>
          </div>

          <!-- CTA -->
          <footer class="ed-footer">
            <button type="button" class="ed-btn ed-btn--block">
              첫 책 시작하기
            </button>
            <button type="button" class="ed-btn ed-btn--ghost ed-btn--block">
              페어에게 초대장 보내기
            </button>
          </footer>

        </section>
</body>
</html>
